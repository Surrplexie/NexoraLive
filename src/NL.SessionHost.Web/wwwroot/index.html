<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NL Session Host</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>NL Session Host</h1>
    <p class="sub">Cross-platform session bus + rule engine (Phase B)</p>
  </header>

  <section class="card" id="bus-card">
    <h2>Session bus</h2>
    <dl id="bus-info"></dl>
    <button type="button" id="copy-bridge-url">Copy bridge URL</button>
  </section>

  <section class="card">
    <h2>Profile</h2>
    <div class="grid">
      <label>Streamer <input id="streamer" /></label>
      <label>Game
        <select id="game"><option>generic</option><option>minecraft</option></select>
      </label>
      <label class="wide">Config (.nle) <input id="config" /></label>
      <label class="wide">Source <input id="source" placeholder="ws://… or file path" /></label>
      <label class="wide">RCON <input id="rcon" placeholder="host:port:password" /></label>
      <label class="wide">NL action <input id="nl-action" placeholder="auto or tcp://…" /></label>
    </div>
    <div class="flags">
      <label><input type="checkbox" id="use-bus" checked /> Use session bus (WebSocket)</label>
      <label><input type="checkbox" id="anti-cheat" checked /> Anti-cheat</label>
      <label><input type="checkbox" id="join-gate" /> Join gate</label>
      <label><input type="checkbox" id="anomaly-auto-mod" /> Anomaly auto-mod</label>
      <label><input type="checkbox" id="replay-once" /> Replay once</label>
    </div>
    <div class="actions">
      <button type="button" id="bus-defaults">Load bus defaults</button>
      <button type="button" id="save-profile">Save profile</button>
      <button type="button" id="start" class="primary">Start session</button>
      <button type="button" id="stop">Stop</button>
    </div>
    <p id="status" class="status"></p>
  </section>

  <section class="card log-card">
    <h2>Log <span id="decisions"></span></h2>
    <pre id="log"></pre>
  </section>

  <script src="app.js"></script>
</body>
</html>
